      },
      {

        "summary": "深度学习模型分析心音，在 GP 确诊前数年检出严重心脏瓣膜疾病。AI 辅助早期诊断从实验室走向临床。",

;

const months = DATA.sort((a,b) => b.month.localeCompare(a.month));
const TABS = [
  {key:'ai',icon:'🤖',label:'AI 发展',cls:'ai-tab',src:'ai'},
  {key:'hmi',icon:'🚗',label:'HMI 行业',cls:'hmi-tab',src:'hmi'},
  {key:'design',icon:'🎨',label:'产品设计',cls:'ds-tab',src:'ds'},
  {key:'depth',icon:'📰',label:'深度阅读',cls:'depth-tab',src:'depth'}
];

let gcat = 'all', searchQ = '', sourceQ = '', yearQ = 'all', expandedMonths = new Set(months.slice(0,2).map(m=>m.month));

// --- Gather all sources for filter ---
function allSources() {
  const s = new Set();
  months.forEach(m => TABS.forEach(t => (m[t.key]||[]).forEach(n => s.add(n.source))));
  return [...s].sort();
}
function renderSourceFilter() {
  const list = document.getElementById('sourceList');
  list.innerHTML = allSources().map(s => `<option value="${s}">`).join('');
}
renderSourceFilter();

// --- Search ---
const searchEl = document.getElementById('search'), searchClear = document.getElementById('searchClear');
searchEl.addEventListener('input', e => { searchQ = e.target.value.trim(); searchClear.classList.toggle('show',!!searchQ); renderAll(); });
searchClear.addEventListener('click', () => { searchEl.value=''; searchQ=''; searchClear.classList.remove('show'); renderAll(); searchEl.focus(); });

// --- Source filter ---
const sourceEl = document.getElementById('sourceFilter');
sourceEl.addEventListener('input', e => { sourceQ = e.target.value.trim(); renderAll(); });

// --- Year filter ---
function renderYearBar() {
  const years = [...new Set(months.map(m => m.month.substring(0,4)))].sort().reverse();
  document.getElementById('yearBar').innerHTML = '<span style="font-size:11px;color:var(--text-muted);opacity:0.5;margin-right:2px;">年份</span>' +
    `<button class="year-pill${yearQ==='all'?' active':''}" data-year="all">全部</button>` +
    years.map(y => `<button class="year-pill${yearQ===y?' active':''}" data-year="${y}">${y}</button>`).join('');
}
document.getElementById('yearBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-pill'); if (!btn || !btn.dataset.year) return;
  yearQ = btn.dataset.year;
  expandedMonths = new Set(months.filter(m => yearQ==='all' || m.month.startsWith(yearQ)).slice(0,2).map(m=>m.month));
  renderYearBar(); renderAll();
});
renderYearBar();

// --- Card builder ---
function buildCard(item, cls) {
  const title = hl(item.title, searchQ);
  const summary = hl(item.summary, searchQ);
  const hlClass = item.hl ? ' hl' : '';
  const cardCls = cls === 'ai' ? 'ai-card' : cls === 'hmi' ? 'hmi-card' : cls === 'depth' ? 'depth-card' : 'ds-card';
  return `<a class="news-card ${cardCls}${hlClass}" href="${item.url||'#'}" target="_blank" rel="noopener" data-id="${item.title.replace(/[^a-zA-Z一-鿿]/g,'-').substring(0,40)}">
    <button class="copy-link" onclick="copyCard(event,'${item.url||''}')" title="复制链接">📋</button>
    <div class="news-title">${title}</div>
    <div class="news-summary">${summary}</div>
    <div class="news-meta"><span class="news-source ${cls}-src">${item.source}</span></div>
  </a>`;
}

function hl(text, q) {
  if (!q || !text) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${esc})`,'gi'), '<span class="hl-text">$1</span>');
}

// --- Filter logic ---
function getFilteredItems(monthData) {
  const result = {};
  TABS.forEach(t => {
    let items = monthData[t.key] || [];
    if (sourceQ) items = items.filter(i => i.source === sourceQ);
    if (searchQ) {
      const q = searchQ.toLowerCase();
      items = items.filter(i => i.title.toLowerCase().includes(q) || i.summary.toLowerCase().includes(q));
    }
    result[t.key] = items;
  });
  return result;
}

function monthEmpty(filtered) {
  return TABS.every(t => filtered[t.key].length === 0);
}

// --- Render ---
function renderAll() {
  const main = document.getElementById('main');
  const visibleMonths = months.filter(m => yearQ === 'all' || m.month.startsWith(yearQ));
  let totalVisible = 0;
  if (visibleMonths.length === 0) {
    main.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div style="font-size:18px;font-weight:600;margin-bottom:4px">该年份暂无数据</div></div>';
    return;
  }
  main.innerHTML = visibleMonths.map((m,i) => {
    const filtered = getFilteredItems(m);
    if (gcat !== 'all' && filtered[gcat].length === 0 && !TABS.some(t=>t.key!==gcat&&filtered[t.key].length>0)) {
      // This month has nothing for the selected global category - still show but with empty indicator
    }
    const empty = monthEmpty(filtered);
    if (gcat !== 'all') {
      const hasContent = filtered[gcat].length > 0;
      if (!hasContent && empty) return ''; // skip entirely empty months when filtered
    }
    if (empty && searchQ) return ''; // skip months with no search match

    const isOpen = expandedMonths.has(m.month);
    const total = TABS.reduce((s,t)=>s+filtered[t.key].length,0);
    totalVisible += total;

    // Pick active tab: first non-empty for global cat, or first overall
    let activeTab = TABS[0].key;
    if (gcat !== 'all' && filtered[gcat].length > 0) activeTab = gcat;
    else TABS.forEach(t => { if (filtered[t.key].length > 0 && activeTab === TABS[0].key && filtered[TABS[0].key].length === 0) activeTab = t.key; });

    return `
    <section class="month-section" id="m-${m.month}">
      <div class="month-header" onclick="toggleMonth('${m.month}')">
        <span class="month-chevron${isOpen?' open':''}">▶</span>
        <span class="month-title">${m.label}</span>
        <span class="month-count">${total} 条</span>
      </div>
      <div class="month-body${isOpen?'':' collapsed'}">
        <div class="cat-tabs" data-month="${m.month}">
          ${TABS.map(t => {
            const cnt = filtered[t.key].length;
            return `<button class="cat-tab ${t.cls}${t.key===activeTab?' active':''}" data-cat="${t.key}" data-month="${m.month}">${t.icon} ${t.label}<span class="tab-count">${cnt}</span></button>`;
          }).join('')}
        </div>
        ${TABS.map(t => `<div class="news-list${t.key===activeTab?'':' hidden'}" data-cat="${t.key}" data-month="${m.month}">${filtered[t.key].length ? filtered[t.key].map(c=>buildCard(c,t.src)).join('') : '<div class="news-card" style="opacity:0.4"><div class="news-summary">本月暂无条目</div></div>'}</div>`).join('')}
      </div>
    </section>`;
  }).join('');

  if (!main.innerHTML.trim()) {
    main.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div style="font-size:18px;font-weight:600;margin-bottom:4px">没有匹配的动态</div><div style="font-size:14px">换个关键词或筛选条件试试</div></div>';
  }
}

// --- Month accordion ---
function toggleMonth(month) {
  if (expandedMonths.has(month)) expandedMonths.delete(month);
  else expandedMonths.add(month);
  const el = document.getElementById('m-'+month);
  const chevron = el.querySelector('.month-chevron');
  const body = el.querySelector('.month-body');
  chevron.classList.toggle('open');
  body.classList.toggle('collapsed');
}

// --- Tab switching ---
document.getElementById('main').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab'); if (!tab) return;
  const cat = tab.dataset.cat; const month = tab.dataset.month;
  const section = document.getElementById('m-'+month);
  section.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  section.querySelectorAll('.news-list').forEach(l => l.classList.toggle('hidden', l.dataset.cat !== cat));
});

// --- Copy card link ---
function copyCard(e, url) {
  e.preventDefault(); e.stopPropagation();
  navigator.clipboard.writeText(url).then(() => {
    const btn = e.target.closest('.copy-link');
    btn.textContent = '✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
  }).catch(()=>{});
}

// --- Keyboard ---
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    const tab = e.target.closest('.cat-tab');
    if (tab) {
      e.preventDefault();
      const tabs = [...tab.parentElement.querySelectorAll('.cat-tab')];
      const idx = tabs.indexOf(tab);
      const next = e.key === 'ArrowRight' ? (idx+1)%tabs.length : (idx-1+tabs.length)%tabs.length;
      tabs[next].click();
    }
  }
  // Toggle month with Space/Enter when focused on month header
  if ((e.key === ' ' || e.key === 'Enter') && e.target.closest('.month-header') && !e.target.closest('input,select,button')) {
    e.preventDefault();
    e.target.closest('.month-header').click();
  }
});

// --- FAB ---
const fab = document.getElementById('fab');
window.addEventListener('scroll', () => { fab.classList.toggle('show', window.scrollY > 600); });

// --- Init ---
renderAll();
</script>
</body>
</html>
